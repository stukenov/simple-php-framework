    <script>
        // Валидация ИИН
        document.getElementById('iin').addEventListener('input', function(e) {
            const iin = e.target.value;
            if (iin.length === 12 && !/^\d{12}$/.test(iin)) {
                e.target.setCustomValidity('ИИН должен содержать только цифры');
            } else if (iin.length > 12) {
                e.target.value = iin.slice(0, 12);
            } else {
                e.target.setCustomValidity('');
            }
        });
    </script>
