<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title><?php echo htmlspecialchars($post->title); ?> - Блог</title>
    <link rel="stylesheet" href="/css/blog.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><?php echo htmlspecialchars($post->title); ?></h1>
            <a href="/blog" class="back-btn">← Назад к списку</a>
        </header>

        <main>
            <div class="post-detail">
                <div class="post-meta">
                    <span class="author">Автор: <?php echo htmlspecialchars($post->author); ?></span>
                    <span class="category">Категория: <?php echo htmlspecialchars($post->category); ?></span>
                    <span class="date">Опубликовано: <?php echo date('d.m.Y H:i', strtotime($post->created_at)); ?></span>
                    <?php if ($post->email): ?>
                        <span class="email">Email: <?php echo htmlspecialchars($post->email); ?></span>
                    <?php endif; ?>
                </div>

                <div class="post-content">
                    <?php echo nl2br(htmlspecialchars($post->content)); ?>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
