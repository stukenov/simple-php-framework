<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Создать объявление</title>
    <link rel="stylesheet" href="/css/blog.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Разместить объявление</h1>
            <a href="/blog" class="back-btn">← Назад к списку</a>
        </header>

        <main>
            <form action="/blog" method="post" class="post-form">
                <div class="form-group">
                    <label for="title">Заголовок *</label>
                    <input type="text" id="title" name="title" required maxlength="100">
                </div>

                <div class="form-group">
                    <label for="category">Категория</label>
                    <select id="category" name="category">
                        <option value="general">Общее</option>
                        <option value="sale">Продажа</option>
                        <option value="buy">Покупка</option>
                        <option value="service">Услуги</option>
                        <option value="job">Работа</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="author">Ваше имя *</label>
                    <input type="text" id="author" name="author" required maxlength="50">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" maxlength="100">
                </div>

                <div class="form-group">
                    <label for="content">Описание *</label>
                    <textarea id="content" name="content" required rows="10" maxlength="2000"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="submit-btn">Опубликовать</button>
                    <a href="/blog" class="cancel-btn">Отмена</a>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
