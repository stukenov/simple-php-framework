<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Блог - Список объявлений</title>
    <link rel="stylesheet" href="/css/blog.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Объявления</h1>
            <a href="/blog/create" class="create-btn">Разместить объявление</a>
        </header>

        <main>
            <?php if (count($posts) > 0): ?>
                <div class="posts-list">
                    <?php foreach ($posts as $post): ?>
                        <div class="post-item">
                            <h2><a href="/blog/<?php echo $post->id; ?>"><?php echo htmlspecialchars($post->title); ?></a></h2>
                            <div class="post-meta">
                                <span class="author"><?php echo htmlspecialchars($post->author); ?></span>
                                <span class="category"><?php echo htmlspecialchars($post->category); ?></span>
                                <span class="date"><?php echo date('d.m.Y H:i', strtotime($post->created_at)); ?></span>
                            </div>
                            <p class="post-content"><?php echo htmlspecialchars(substr($post->content, 0, 200)); ?>...</p>
                        </div>
                    <?php endforeach; ?>
                </div>
            <?php else: ?>
                <div class="no-posts">
                    <p>Пока нет объявлений. <a href="/blog/create">Создайте первое!</a></p>
                </div>
            <?php endif; ?>
        </main>
    </div>
</body>
</html>
